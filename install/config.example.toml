# Example config generated by the one-click installer.

[identity]
node_id = 1001
panel_url = "https://api.example.com"
identity_file = "/var/lib/xaccel-node/identity.json"

[runtime]
data_dir = "/var/lib/xaccel-node"
log_dir = "/var/log/xaccel-node"
health_addr = "127.0.0.1:9876"
channel = "stable"

[network]
server_ip = "1.2.3.4"
listen_ip = "0.0.0.0"
server_port = 666
relay_server_ip = ""
relay_server_port = 0
is_support_ipv6 = false
disable_quic = false
area = "HK"
bandwidth_quality = "normal"
tag = "free"

[network.operator_ips]
telecom_ip = ""
mobile_ip = ""
unicom_ip = ""

[control]
enabled = true
config_revision = 1
request_timeout_sec = 5

[report]
interval_sec = 30
traffic_batch_sec = 60
metrics_interval_sec = 15

[limits]
max_sessions = 200000
max_sessions_per_user = 256
max_udp_mappings = 500000
default_user_speed_mbps = 0
