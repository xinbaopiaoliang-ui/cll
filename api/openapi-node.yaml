openapi: 3.0.3
info:
  title: XAccel Node Control API
  version: 0.25.0
  description: Backend APIs used by the Linux acceleration node installer and daemon.
servers:
  - url: https://api.example.com
paths:
  /api/client/v1/connect-intent:
    post:
      summary: Issue a short-lived client connect intent.
      description: Returns candidate acceleration nodes and an xat.v1 token that binds the selected UDP route.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectIntentRequest'
      responses:
        '200':
          description: Candidate nodes and route-bound credential.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectIntentResponse'
        '400':
          description: Invalid client, device, game, or scheduling request.
  /api/node/v1/bootstrap:
    post:
      summary: Exchange a one-time bootstrap token for node identity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapRequest'
      responses:
        '200':
          description: Node identity and release info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'
        '400':
          description: Invalid request, expired token, used token, or IP mismatch.
  /api/node/v1/handshake:
    post:
      summary: Node daemon handshake after service start.
      security:
        - NodeHmac: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HandshakeRequest'
      responses:
        '200':
          description: Control-plane capabilities and config revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HandshakeResponse'
  /api/node/v1/config:
    get:
      summary: Fetch signed node runtime configuration.
      description: Nodes poll this endpoint with X-Node-* HMAC headers. The response contains the current network config_revision and hot-applyable fields.
      security:
        - NodeHmac: []
      responses:
        '200':
          description: Current node config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeConfigResponse'
        '401':
          description: Unknown node, stale timestamp, or invalid signature.
  /api/node/v1/report:
    post:
      summary: Report traffic, sessions, quality, system load, install errors, and status.
      security:
        - NodeHmac: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeReport'
      responses:
        '200':
          description: Report accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeReportResponse'
  /api/admin/v1/nodes:
    get:
      summary: List managed acceleration nodes.
      security:
        - AdminBearer: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Node list with latest report summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListNodesResponse'
        '401':
          description: Admin token missing or invalid.
    post:
      summary: Create a managed acceleration node.
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateNodeRequest'
      responses:
        '200':
          description: Node created in pending_install state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreateNodeResponse'
        '409':
          description: Node endpoint already exists.
  /api/admin/v1/nodes/{node_id}:
    get:
      summary: Get one managed node and recent runtime reports.
      security:
        - AdminBearer: []
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Node detail and recent report snapshots.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminNodeDetailResponse'
        '404':
          description: Node does not exist.
    patch:
      summary: Update node configuration and increment config_revision.
      description: Safe fields are picked up by the node config loop; endpoint/listener changes are marked restart_required in node health until the service restarts.
      security:
        - AdminBearer: []
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateNodeRequest'
      responses:
        '200':
          description: Updated node summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUpdateNodeResponse'
        '404':
          description: Node does not exist.
        '409':
          description: Node endpoint already exists.
  /api/admin/v1/nodes/{node_id}/status:
    patch:
      summary: Update a managed node status.
      security:
        - AdminBearer: []
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateNodeStatusRequest'
      responses:
        '200':
          description: Node status updated and audit log stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUpdateNodeStatusResponse'
  /api/admin/v1/nodes/{node_id}/bootstrap-token:
    post:
      summary: Create a one-time bootstrap token and install command for a node.
      security:
        - AdminBearer: []
      parameters:
        - name: node_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateBootstrapTokenRequest'
      responses:
        '200':
          description: Bootstrap token and one-line Linux install command.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreateBootstrapTokenResponse'
        '404':
          description: Node does not exist.
  /api/admin/v1/game-route-rules:
    get:
      summary: List game route rules.
      security:
        - AdminBearer: []
      parameters:
        - name: game_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: node_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [enabled, disabled]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Route rule list joined with node summary fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListRouteRulesResponse'
    post:
      summary: Create a game route rule.
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRouteRuleRequest'
      responses:
        '200':
          description: Route rule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRouteRuleResponse'
        '404':
          description: Node does not exist.
        '409':
          description: Route rule already exists.
  /api/admin/v1/game-route-rules/{rule_id}:
    patch:
      summary: Update a game route rule.
      security:
        - AdminBearer: []
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRouteRuleRequest'
      responses:
        '200':
          description: Route rule updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRouteRuleResponse'
        '404':
          description: Route rule or node does not exist.
        '409':
          description: Route rule already exists.
    delete:
      summary: Delete a game route rule.
      security:
        - AdminBearer: []
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Route rule deleted when it existed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDeleteRouteRuleResponse'
components:
  securitySchemes:
    NodeHmac:
      type: apiKey
      in: header
      name: X-Node-Signature
      description: HMAC-SHA256 over method, path, timestamp, nonce, and base64 body sha256.
    AdminBearer:
      type: http
      scheme: bearer
      description: Admin API token from XACCEL_ADMIN_TOKEN.
  schemas:
    ConnectIntentRequest:
      type: object
      required:
        - user_id
        - device_id
        - game_id
      properties:
        user_id:
          type: integer
          minimum: 1
        device_id:
          type: string
          minLength: 1
        game_id:
          type: integer
          minimum: 1
        platform:
          type: string
          nullable: true
          example: pc
        client_isp:
          type: string
          nullable: true
          example: telecom
        client_ip:
          type: string
          nullable: true
          example: 203.0.113.20
        bandwidth_quality:
          type: string
          nullable: true
          enum: [fast, normal, slow]
    ConnectIntentResponse:
      type: object
      required:
        - intent_id
        - ttl_sec
        - client
        - candidates
      properties:
        intent_id:
          type: string
        ttl_sec:
          type: integer
        client:
          type: object
          properties:
            platform:
              type: string
              nullable: true
            client_isp:
              type: string
              nullable: true
            client_ip:
              type: string
              nullable: true
            bandwidth_quality:
              type: string
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/NodeCandidate'
    NodeCandidate:
      type: object
      required:
        - node_id
        - area
        - tag
        - host
        - port
        - transports
        - bandwidth_quality
        - probe
        - route
        - credential
      properties:
        node_id:
          type: integer
        area:
          type: string
        tag:
          type: string
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        transports:
          type: array
          items:
            type: string
            enum: [udp, tcp, quic_udp, tcp_tls]
        bandwidth_quality:
          type: string
        probe:
          $ref: '#/components/schemas/ProbeInfo'
        route:
          $ref: '#/components/schemas/ClientRoute'
        credential:
          $ref: '#/components/schemas/CredentialInfo'
    ProbeInfo:
      type: object
      properties:
        udp:
          type: boolean
        tcp:
          type: boolean
        protocol:
          type: string
          enum: [xaccel/1]
    ClientRoute:
      type: object
      required:
        - target_addr
        - protocol
      properties:
        target_addr:
          type: string
          example: 127.0.0.1:7777
        protocol:
          type: string
          enum: [udp]
    CredentialInfo:
      type: object
      required:
        - token
        - expires_at
        - intent_id
        - route
      properties:
        token:
          type: string
          description: xat.v1 base64url payload plus HMAC-SHA256 signature.
        expires_at:
          type: integer
        intent_id:
          type: string
        route:
          $ref: '#/components/schemas/ClientRoute'
    BootstrapRequest:
      type: object
      required:
        - bootstrap_token
        - hostname
        - os
        - arch
        - kernel
        - ips
        - installer_version
      properties:
        bootstrap_token:
          type: string
        hostname:
          type: string
        os:
          type: string
          enum: [linux]
        arch:
          type: string
          enum: [x86_64, aarch64]
        kernel:
          type: string
        ips:
          type: array
          items:
            type: string
        installer_version:
          type: string
    BootstrapResponse:
      type: object
      required:
        - node_id
        - node_secret
        - panel_url
        - server_ip
        - server_port
        - config_revision
        - release
      properties:
        node_id:
          type: integer
        node_secret:
          type: string
        panel_url:
          type: string
          format: uri
        server_ip:
          type: string
        server_port:
          type: integer
        config_revision:
          type: integer
        release:
          type: object
          required: [version, manifest_url]
          properties:
            version:
              type: string
            manifest_url:
              type: string
              format: uri
    HandshakeRequest:
      type: object
      required:
        - node_id
        - node_version
        - os
        - arch
        - boot_id
        - timestamp
        - nonce
      properties:
        node_id:
          type: integer
        node_version:
          type: string
        os:
          type: string
        arch:
          type: string
        boot_id:
          type: string
        timestamp:
          type: integer
        nonce:
          type: string
        config_revision:
          type: integer
          minimum: 1
        listen_addr:
          type: string
    HandshakeResponse:
      type: object
      required:
        - status
        - node_id
        - server_time
        - config_revision
        - min_node_version
        - websocket
      properties:
        status:
          type: string
          enum: [ok]
        node_id:
          type: integer
        server_time:
          type: integer
        config_revision:
          type: integer
        min_node_version:
          type: string
        websocket:
          type: object
          properties:
            enabled:
              type: boolean
            url:
              type: string
              format: uri
    NodeConfig:
      type: object
      required:
        - schema_version
        - config_revision
        - node
        - transports
        - limits
        - report
      properties:
        schema_version:
          type: integer
        config_revision:
          type: integer
        issued_at:
          type: integer
        expires_at:
          type: integer
        node:
          $ref: '#/components/schemas/NodeFields'
        transports:
          type: object
        limits:
          type: object
        report:
          type: object
        security:
          type: object
    NodeConfigResponse:
      type: object
      required:
        - status
        - node_id
        - config_revision
        - server_time
        - network
      properties:
        status:
          type: string
          enum: [ok]
        node_id:
          type: integer
        config_revision:
          type: integer
          minimum: 1
        server_time:
          type: integer
        network:
          $ref: '#/components/schemas/NodeRuntimeNetworkConfig'
    NodeRuntimeNetworkConfig:
      type: object
      required:
        - server_ip
        - listen_ip
        - server_port
        - is_support_ipv6
        - disable_quic
        - area
        - bandwidth_quality
        - operator_ips
      properties:
        server_ip:
          type: string
        listen_ip:
          type: string
          example: 0.0.0.0
        server_port:
          type: integer
          minimum: 1
          maximum: 65535
        relay_server_ip:
          type: string
          nullable: true
        relay_server_port:
          type: integer
          minimum: 1
          maximum: 65535
          nullable: true
        is_support_ipv6:
          type: boolean
        disable_quic:
          type: boolean
        area:
          type: string
        bandwidth_quality:
          type: string
          enum: [fast, normal, slow]
        tag:
          type: string
          nullable: true
        operator_ips:
          type: object
          properties:
            telecom_ip:
              type: string
              nullable: true
            mobile_ip:
              type: string
              nullable: true
            unicom_ip:
              type: string
              nullable: true
    NodeFields:
      type: object
      required:
        - id
        - server_ip
        - server_port
        - is_support_ipv6
        - bandwidth_quality
        - disable_quic
        - area
        - is_local_ip
        - status
      properties:
        id:
          type: integer
        server_ip:
          type: string
        server_port:
          type: integer
        relay_server_ip:
          type: string
          nullable: true
        relay_server_port:
          type: integer
          nullable: true
        is_support_ipv6:
          type: boolean
        bandwidth_quality:
          type: string
          enum: [fast, normal, slow]
        disable_quic:
          type: boolean
        area:
          type: string
        is_local_ip:
          type: boolean
        telecom_ip:
          type: string
          nullable: true
        mobile_ip:
          type: string
          nullable: true
        unicom_ip:
          type: string
          nullable: true
        tag:
          type: string
          nullable: true
        status:
          type: integer
    NodeReport:
      type: object
      required:
        - node_id
        - config_revision
        - node_version
        - status
        - timestamp
        - health
      properties:
        node_id:
          type: integer
        config_revision:
          type: integer
        node_version:
          type: string
        timestamp:
          type: integer
        status:
          type: string
        health:
          type: object
          description: Full xaccel-node /health snapshot.
    NodeReportResponse:
      type: object
      required:
        - status
        - node_id
        - stored
        - server_time
      properties:
        status:
          type: string
          enum: [ok]
        node_id:
          type: integer
        stored:
          type: boolean
        server_time:
          type: integer
    AdminListNodesResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/AdminNodeSummary'
        total:
          type: integer
        server_time:
          type: integer
    AdminNodeDetailResponse:
      type: object
      properties:
        node:
          $ref: '#/components/schemas/AdminNodeSummary'
        recent_reports:
          type: array
          items:
            $ref: '#/components/schemas/AdminReportDetail'
        server_time:
          type: integer
    AdminCreateNodeRequest:
      type: object
      required:
        - name
        - server_ip
        - server_port
      properties:
        name:
          type: string
          maxLength: 128
        server_ip:
          type: string
          example: 103.201.131.99
        server_port:
          type: integer
          minimum: 1
          maximum: 65535
          example: 666
        relay_server_ip:
          type: string
          nullable: true
        relay_server_port:
          type: integer
          minimum: 1
          maximum: 65535
          nullable: true
        is_support_ipv6:
          type: boolean
          default: false
        bandwidth_quality:
          type: string
          enum: [fast, normal, slow]
          default: normal
        disable_quic:
          type: boolean
          default: false
        area:
          type: string
          default: UNKNOWN
        telecom_ip:
          type: string
          nullable: true
        mobile_ip:
          type: string
          nullable: true
        unicom_ip:
          type: string
          nullable: true
        tag:
          type: string
          nullable: true
    AdminUpdateNodeRequest:
      allOf:
        - $ref: '#/components/schemas/AdminCreateNodeRequest'
    AdminCreateNodeResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        node:
          $ref: '#/components/schemas/AdminNodeSummary'
        server_time:
          type: integer
    AdminUpdateNodeResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        node:
          $ref: '#/components/schemas/AdminNodeSummary'
        server_time:
          type: integer
    AdminUpdateNodeStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [pending_install, draining, offline, install_failed, disabled]
        reason:
          type: string
          nullable: true
    AdminUpdateNodeStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        node_id:
          type: integer
        previous_status:
          type: string
        current_status:
          type: string
        reason:
          type: string
          nullable: true
        server_time:
          type: integer
    AdminCreateBootstrapTokenRequest:
      type: object
      properties:
        expires_in_sec:
          type: integer
          minimum: 1
          maximum: 86400
          default: 3600
        created_by:
          type: integer
          nullable: true
        public_base_url:
          type: string
          format: uri
          nullable: true
        install_url:
          type: string
          format: uri
          nullable: true
        enable_control_plane:
          type: boolean
          default: true
        channel:
          type: string
          nullable: true
    AdminCreateBootstrapTokenResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        node_id:
          type: integer
        bootstrap_token:
          type: string
        bootstrap_url:
          type: string
          format: uri
        expires_at:
          type: integer
        install_command:
          type: string
        server_time:
          type: integer
    AdminListRouteRulesResponse:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/AdminRouteRuleSummary'
        total:
          type: integer
        server_time:
          type: integer
    AdminRouteRuleRequest:
      type: object
      required:
        - game_id
        - game_name
        - node_id
        - target_addr
      properties:
        game_id:
          type: integer
          minimum: 1
          example: 8888
        game_name:
          type: string
          maxLength: 128
          example: Local Echo Test
        node_id:
          type: integer
          minimum: 1
          example: 1
        target_addr:
          type: string
          maxLength: 255
          example: 127.0.0.1:7777
        protocol:
          type: string
          enum: [udp]
          default: udp
        area:
          type: string
          nullable: true
          maxLength: 32
        tag:
          type: string
          nullable: true
          maxLength: 64
        priority:
          type: integer
          minimum: 0
          default: 100
        status:
          type: string
          enum: [enabled, disabled]
          default: enabled
    AdminRouteRuleResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        rule:
          $ref: '#/components/schemas/AdminRouteRuleSummary'
        server_time:
          type: integer
    AdminDeleteRouteRuleResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        rule_id:
          type: integer
        deleted:
          type: boolean
        server_time:
          type: integer
    AdminRouteRuleSummary:
      type: object
      properties:
        id:
          type: integer
        game_id:
          type: integer
        game_name:
          type: string
        node_id:
          type: integer
        node_name:
          type: string
        node_endpoint:
          type: string
        node_status:
          type: string
        target_addr:
          type: string
        protocol:
          type: string
          enum: [udp]
        area:
          type: string
          nullable: true
        tag:
          type: string
          nullable: true
        priority:
          type: integer
        status:
          type: string
          enum: [enabled, disabled]
        created_at:
          type: integer
          nullable: true
        updated_at:
          type: integer
          nullable: true
    AdminNodeSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        endpoint:
          type: string
        server_ip:
          type: string
        server_port:
          type: integer
        relay_server_ip:
          type: string
          nullable: true
        relay_server_port:
          type: integer
          nullable: true
        is_support_ipv6:
          type: boolean
        area:
          type: string
        tag:
          type: string
          nullable: true
        bandwidth_quality:
          type: string
        disable_quic:
          type: boolean
        telecom_ip:
          type: string
          nullable: true
        mobile_ip:
          type: string
          nullable: true
        unicom_ip:
          type: string
          nullable: true
        status:
          type: string
        kernel_version:
          type: string
          nullable: true
        config_revision:
          type: integer
        last_seen_at:
          type: integer
          nullable: true
        last_report_at:
          type: integer
          nullable: true
        latest_report:
          $ref: '#/components/schemas/AdminReportSummary'
          nullable: true
    AdminReportSummary:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        active_sessions:
          type: integer
        udp_sessions:
          type: integer
        tcp_sessions:
          type: integer
        reported_at:
          type: integer
          nullable: true
    AdminReportDetail:
      allOf:
        - $ref: '#/components/schemas/AdminReportSummary'
        - type: object
          properties:
            node_id:
              type: integer
            config_revision:
              type: integer
            raw:
              type: object
              nullable: true
    ClientSessionDataRequest:
      type: object
      description: UDP packet sent after a successful probe session is allocated.
      required:
        - type
        - protocol
        - session_id
        - payload
      properties:
        type:
          type: string
          enum: [session.data]
        protocol:
          type: string
          enum: [xaccel/1]
        session_id:
          type: string
        client_nonce:
          type: string
        payload:
          type: string
          description: Base64 payload. Echoed when no target is provided; forwarded when a target is present.
        target_addr:
          type: string
          description: Optional development target UDP endpoint such as 127.0.0.1:7777. Token-bound route wins when present.
        target_host:
          type: string
          description: Optional target host or IP used with target_port.
        target_port:
          type: integer
          minimum: 1
          maximum: 65535
        response_timeout_ms:
          type: integer
          description: Upstream UDP response wait timeout, clamped to 1-1000 ms.
    ClientSessionDataResponse:
      type: object
      properties:
        type:
          type: string
          enum: [session.data.ok, session.error]
        protocol:
          type: string
          enum: [xaccel/1]
        node_id:
          type: integer
          nullable: true
        node_version:
          type: string
        server_time:
          type: integer
        transport:
          type: string
          enum: [udp]
        session_id:
          type: string
        client_nonce:
          type: string
          nullable: true
        status:
          type: string
          enum: [echo, forwarded, upstream_timeout]
        payload:
          type: string
        payload_bytes:
          type: integer
        request_payload_bytes:
          type: integer
        target:
          type: object
          nullable: true
          properties:
            address:
              type: string
        relay:
          type: object
          nullable: true
          properties:
            mode:
              type: string
              enum: [udp_target]
            timeout_ms:
              type: integer
            timed_out:
              type: boolean
            upstream_tx_bytes:
              type: integer
            upstream_rx_bytes:
              type: integer
        session:
          type: object
          properties:
            created_at:
              type: integer
            expires_at:
              type: integer
            authenticated:
              type: boolean
            intent_id:
              type: string
              nullable: true
            route_target_addr:
              type: string
              nullable: true
            user_id:
              type: integer
              nullable: true
            device_id:
              type: string
              nullable: true
            game_id:
              type: integer
              nullable: true
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - missing_session_id
                - missing_payload
                - invalid_payload
                - session_not_found
                - session_expired
                - missing_target_port
                - invalid_target
                - relay_auth_required
                - relay_error
                - unsupported_transport
            message:
              type: string
    ClientProbeRequest:
      type: object
      description: JSON packet sent by the client directly to a node TCP/UDP listener.
      required:
        - type
        - protocol
      properties:
        type:
          type: string
          enum: [probe]
        protocol:
          type: string
          enum: [xaccel/1]
        client_nonce:
          type: string
        user_id:
          type: integer
        device_id:
          type: string
        game_id:
          type: integer
        transport:
          type: string
          enum: [tcp, udp]
        token:
          type: string
          description: Short-lived xat.v1 HMAC client credential.
    ClientProbeResponse:
      type: object
      properties:
        type:
          type: string
          enum: [probe.ok, probe.error]
        protocol:
          type: string
          enum: [xaccel/1]
        node_id:
          type: integer
          nullable: true
        node_version:
          type: string
        server_time:
          type: integer
        transport:
          type: string
          enum: [tcp, udp]
        requested_transport:
          type: string
          nullable: true
          enum: [tcp, udp]
        client_nonce:
          type: string
          nullable: true
        session:
          type: object
          properties:
            session_id:
              type: string
            status:
              type: string
              enum: [probe_only]
            ttl_sec:
              type: integer
            auth_required:
              type: boolean
            credential_present:
              type: boolean
            credential_valid:
              type: boolean
            credential_expires_at:
              type: integer
              nullable: true
            intent_id:
              type: string
              nullable: true
            route_target_addr:
              type: string
              nullable: true
            user_id:
              type: integer
              nullable: true
            device_id:
              type: string
              nullable: true
            game_id:
              type: integer
              nullable: true
        capabilities:
          type: array
          items:
            type: string
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
